<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usama | Android Developer</title>
    <style>
        :root {
            --primary: #26b0fa; 
            --secondary: #03dac6; 
            --whatsapp: #25D366;
            --bg: #c4c4c4;
            --surface: #1e1e1e;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            background: var(--surface);
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        /* --- THE FIXED HOVER SECTION --- */
        .card {
            background: #252525;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: left;
            transition: all 0.3s ease; /* Makes the movement smooth */
        }

        .card:hover {
            transform: translateY(-10px); /* Lifts the card */
            border-color: var(--secondary); /* Changes border color on hover */
            box-shadow: 0 10px 20px rgba(3, 218, 198, 0.2); /* Adds a subtle glow */
        }
        /* ------------------------------- */

        .btn-group { margin-top: 40px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        button, .wa-btn {
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .wa-btn { background-color: var(--whatsapp); color: white; }
        .wa-btn:hover { background-color: #128C7E; transform: scale(1.05); }

        .secondary-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .secondary-btn:hover {
            background: rgba(187, 134, 252, 0.1);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
       <header>
    <h3 style="color: var(--secondary); margin-bottom: 0; font-weight: 400; opacity: 0.8; font-size: 1.1rem;">
        Welcome Guys!
    </h3>
        <header>
            <h1>Usama's Portfolio 🚀</h1>
            <p style="opacity: 0.7;">Android Developer | Kotlin & Full Stack Explorer</p>
        </header>
        
        <div class="project-grid">
            <div class="card">
                <h3>🥛 Al-Muqeet Milk</h3>
                <p>Management system with PDF billing. Built for my uncle's business.</p>
            </div>
            
            <div class="card">
                <h3>🔐 Aequs Vault</h3>
                <p>Daily expense tracker with secure manual cloud backup.</p>
            </div>
        </div>

        <div class="btn-group">
           <a href="https://wa.me/923105381868?text=Hi%20Usama,%20i%20just%20saw%20your%20Profile!" 
   class="wa-btn" target="_blank">
    Contact on WhatsApp 💬
</a>
            <button class="secondary-btn" onclick="location.href='https://github.com/usamaofficiall1212-cloud'">GitHub</button>
        </div>
    </div>

</body>
</html>
