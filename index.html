<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Dev | Web Portfolio</title>
    <style>
        /* This is the "Modifier" section (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5; /* Dark Mode like Android Studio */
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 20px;
            background: #1e1e1e;
        }
        h1 { color: #bb86fc; } /* Android Material Purple */
        button {
            background-color: #03dac6;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background-color: #018786; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Usama's Portfolio 🚀</h1>
        <p>Android Developer | Transitioning to Full Stack</p>
        
        <div class="project-grid" style="display: flex; gap: 20px; margin-top: 30px; justify-content: center;">
            <div class="card" style="background: #2c2c2c; padding: 20px; border-radius: 15px; width: 200px;">
                <h3>🥛 Al-Muqeet</h3>
                <p style="font-size: 0.8rem;">Milk Management App with PDF Billing.</p>
            </div>
            
            <div class="card" style="background: #2c2c2c; padding: 20px; border-radius: 15px; width: 200px;">
                <h3>🔐 Aequs Vault</h3>
                <p style="font-size: 0.8rem;">Personal Finance & Expense Tracker.</p>
            </div>
        </div>

        <button onclick="showAlert()">Ping System</button>
    </div>

    <script>
        function showAlert() {
            const time = new Date().toLocaleTimeString();
            alert("System Online at " + time + "\nNo Gradle sync needed!");
        }
    </script>

</body>
</html>
